<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8">
    <title>Conversor de Moedas</title>
    <link rel="stylesheet" href="style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Link para usar icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css"/>
  </head>
  <body>
    <div class="wrapper">
      <header>Convertendo Moedas</header>
      <form action="#">
        <div class="amount">
          <p>Insira o valor</p>
          <input type="number" value="1">
        </div>
        <div class="drop-list">
          <div class="from">
            <p>De</p>
            <div class="select-box">
              <img src="https://flagcdn.com/48x36/us.png" alt="Bandeira">
              <select> <!-- A tag de opções é inserida a partir do JavaScript --> </select>
            </div>
          </div>
          <div class="icon"><i class="fas fa-exchange-alt"></i></div>
          <div class="to">
            <p>Para</p>
            <div class="select-box">
              <img src="https://flagcdn.com/48x36/br.png" alt="Bandeira">
              <select> <!-- A tag de opções é inserida a partir do JavaScript --> </select>
            </div>
          </div>
        </div>
        <div class="exchange-rate">Convertendo...</div>
        <button type="submit">Converter</button>
      </form>
    </div>

    <script src="lista-paises.js"></script>
    <script src="script.js"></script>

  </body>
</html>
